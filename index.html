<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth Tycoon</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }

        body.dark-mode {
            background-color: #1a1a2e;
        }

        body.dark-mode .hud {
            background: rgba(30, 30, 50, 0.92);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        body.dark-mode .stat-label {
            color: #aab;
        }

        body.dark-mode .stat-value {
            color: #e0e0e0;
        }

        body.dark-mode .btn-claim:disabled {
            background: #555;
            color: #888;
        }

        body.dark-mode #purchase-modal, body.dark-mode #save-warning-modal {
            background: #2a2a3e;
        }

        body.dark-mode #purchase-modal h2, body.dark-mode #save-warning-modal h2 {
            color: #eee;
        }

        body.dark-mode #purchase-modal p, body.dark-mode #save-warning-modal p {
            color: #ccc;
        }

        body.dark-mode .btn-continue {
            background: #3a3a50;
            color: #eee;
        }

        body.dark-mode .toast {
            background: rgba(255,255,255,0.9);
            color: #111;
        }

        body.dark-mode #gift-hud {
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
        }

        body.dark-mode #btn-manual-save, body.dark-mode #btn-manual-load {
            background: #3a3a50 !important;
        }

        /* Theme Toggle Button */
        #theme-toggle {
            position: absolute;
            top: 25px;
            right: 15px;
            z-index: 1500;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #f39c12, #f1c40f);
            box-shadow: 0 2px 10px rgba(243, 156, 18, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow: hidden;
        }

        #theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
        }

        #theme-toggle:active {
            transform: scale(0.9);
        }

        #theme-toggle .icon {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: inline-block;
        }

        #theme-toggle.dark .icon {
            transform: rotate(360deg) scale(0.8);
        }

        #theme-toggle.dark {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            box-shadow: 0 2px 10px rgba(52, 152, 219, 0.5);
        }

        @keyframes themeSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.5); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .theme-spinning .icon {
            animation: themeSpin 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        .hud {
            position: absolute;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 10px 15px;
            pointer-events: auto;
        }

        #top-bar {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            width: 95%;
            max-width: 600px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 60px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
        }

        .stat-value {
            font-size: 1.0rem;
            font-weight: 900;
            color: #2c3e50;
            text-align: center;
        }

        .money {
            color: #27ae60;
        }

        .yield-bonus {
            font-size: 0.55rem;
            color: #e67e22;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
        }

        .yield-final {
            font-size: 1.15rem;
            font-weight: 900;
            color: #27ae60;
            text-align: center;
        }

        #bottom-bar {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-buy {
            background: #3498db;
            position: relative;
        }

        .btn-buy.active {
            background: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
        }

        .free-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f39c12;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 900;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: 2px solid white;
            animation: badgePulse 1.5s infinite;
        }

        .free-badge.hidden {
            display: none;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .btn-claim {
            background: #f1c40f;
            color: #d35400;
        }

        .btn-claim:disabled {
            background: #bdc3c7;
            color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        .btn-checkout {
            background: #2ecc71;
            display: none;
        }

        .btn-checkout:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        /* Gifts Tab */
        #gift-hud {
            top: 100px;
            right: 15px;
            padding: 15px;
            cursor: pointer;
            background: #9b59b6;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.6);
            transition: transform 0.2s, background 0.3s;
        }

        /* Modals / Popups */
        #purchase-modal, #save-warning-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 85%;
            max-width: 340px;
        }

        #purchase-modal h2, #save-warning-modal h2 {
            margin-bottom: 10px;
            color: #333;
        }

        #purchase-modal p, #save-warning-modal p {
            margin-bottom: 20px;
            color: #555;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-confirm {
            background: #2ecc71;
            flex: 1;
        }

        .btn-cancel {
            background: #95a5a6;
            flex: 1;
        }

        /* Rarity Reveal Screen - Animated */
        #reveal-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 20, 30, 0.95);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .reveal-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .reveal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            width: 90%;
            max-width: 350px;
            margin-bottom: 30px;
            padding-right: 5px;
        }

        .reveal-item {
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .reveal-item-name {
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .reveal-item-rent {
            font-size: 1rem;
            opacity: 0.9;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-continue {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-continue:hover {
            background: #bdc3c7;
        }

        /* Message Toast */
        #toast {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 4000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: bold;
            text-align: center;
            width: 85%;
            max-width: 300px;
        }
        
        .leaflet-control-zoom {
            margin-top: 110px !important;
        }

        /* Hidden file input for loading saves */
        #file-input {
            display: none;
        }

        /* Tooltip style for rent on map tiles */
        .leaflet-tooltip.rent-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: white !important;
            font-size: 0.8rem;
            font-weight: 900;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 0px 5px rgba(0,0,0,0.8);
            text-align: center;
            padding: 0 !important;
            margin: 0 !important;
            transition: opacity 0.3s;
        }
        .leaflet-tooltip.rent-label::before {
            display: none !important;
        }

        /* Distance money notification */
        #distance-money {
            position: absolute;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3900;
            background: rgba(39, 174, 96, 0.9);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        /* Buy mode grid price labels */
        .leaflet-tooltip.buy-price-label {
            background: rgba(0,0,0,0.7) !important;
            border: 1px solid rgba(255,255,255,0.3) !important;
            border-radius: 4px !important;
            box-shadow: none !important;
            color: #f1c40f !important;
            font-size: 0.6rem;
            font-weight: 800;
            text-shadow: none !important;
            text-align: center;
            padding: 1px 3px !important;
            margin: 0 !important;
            white-space: nowrap;
        }
        .leaflet-tooltip.buy-price-label::before {
            display: none !important;
        }

        /* Detail labels for owned tiles (zoomed very close) */
        .leaflet-tooltip.detail-label {
            background: rgba(0,0,0,0.75) !important;
            border: none !important;
            border-radius: 4px !important;
            box-shadow: none !important;
            color: #fff !important;
            font-size: 0.5rem;
            font-weight: 600;
            text-shadow: none !important;
            text-align: left;
            padding: 2px 4px !important;
            margin: 0 !important;
            line-height: 1.2;
            white-space: nowrap;
        }
        .leaflet-tooltip.detail-label::before {
            display: none !important;
        }

        /* Hide labels and tiles when zoomed out */
        .zoomed-out .rent-label {
            display: none !important;
            opacity: 0 !important;
        }

        /* Custom marker cluster styling */
        .custom-cluster-icon {
            background: transparent;
        }


        /* Cheapest Property Button */
        #btn-cheapest {
            position: absolute;
            bottom: 95px;
            left: 15px;
            z-index: 1000;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            font-weight: 800;
            font-size: 0.78rem;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(230, 126, 34, 0.5);
            transition: transform 0.2s, background 0.3s;
            text-align: center;
            line-height: 1.2;
        }

        #btn-cheapest:hover {
            transform: scale(1.05);
        }

        #btn-cheapest:active {
            transform: scale(0.95);
        }

        #btn-cheapest .cheapest-icon {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 2px;
        }

        /* Mobile adjustments */
        @media (max-width: 500px) {
            #settings-btn {
                top: 75px !important;
                left: 10px !important;
                width: 36px !important;
                height: 36px !important;
                font-size: 1.1rem !important;
            }
            #settings-panel {
                top: 120px !important;
                left: 10px !important;
            }
            #theme-toggle {
                top: 75px !important;
                right: 10px !important;
                width: 36px !important;
                height: 36px !important;
                font-size: 1.1rem !important;
            }
            #gift-hud {
                top: 125px !important;
                right: 10px !important;
                padding: 10px !important;
            }
            #top-bar {
                padding: 8px 10px !important;
            }
            .stat-label {
                font-size: 0.55rem !important;
            }
            .stat-value {
                font-size: 0.85rem !important;
            }
            .yield-final {
                font-size: 0.95rem !important;
            }
            #location-text {
                font-size: 0.75rem !important;
            }
        }

    </style>
</head>
<body>

    <button id="theme-toggle" class="light" onclick="toggleTheme()">
        <span class="icon">☀️</span>
    </button>

    <button id="settings-btn" style="position:absolute; top:25px; left:15px; z-index:1500; width:44px; height:44px; border-radius:50%; border:none; background:rgba(52,73,94,0.85); color:white; font-size:1.3rem; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3); transition: transform 0.2s;" onclick="toggleSettings()">⚙️</button>

    <div id="settings-panel" style="display:none; position:absolute; top:75px; left:15px; z-index:2000; background:rgba(30,30,50,0.95); color:white; border-radius:12px; padding:15px; box-shadow:0 5px 20px rgba(0,0,0,0.5); min-width:180px;">
        <div style="font-weight:800; font-size:0.9rem; margin-bottom:12px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:8px;">⚙️ Settings</div>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:0.8rem; font-weight:600;">🌙 Dark Mode</span>
            <div id="settings-theme-toggle" onclick="toggleTheme()" style="width:40px; height:22px; border-radius:11px; background:#555; cursor:pointer; position:relative; transition: background 0.3s;">
                <div id="settings-theme-dot" style="width:18px; height:18px; border-radius:50%; background:white; position:absolute; top:2px; left:2px; transition: left 0.3s;"></div>
            </div>
        </div>
        <button onclick="exportSaveFile()" style="width:100%; padding:8px; border:none; border-radius:8px; background:#2980b9; color:white; font-weight:700; font-size:0.78rem; cursor:pointer; margin-bottom:6px;">💾 Save File</button>
        <button onclick="document.getElementById('file-input').click()" style="width:100%; padding:8px; border:none; border-radius:8px; background:#8e44ad; color:white; font-weight:700; font-size:0.78rem; cursor:pointer;">📂 Load File</button>
    </div>

    <div id="top-bar" class="hud">
        <div class="stat-box">
            <span class="stat-label">Balance</span>
            <span class="stat-value money" id="balance-display">$2,500.00</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">$/Hour</span>
            <span class="yield-bonus" id="hourly-bonus-display"></span>
            <span class="yield-final" id="hourly-yield-display">$0.00</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Pending</span>
            <span class="stat-value money" id="rent-display">$0.00</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Properties</span>
            <span class="stat-value" id="property-count">0</span>
        </div>
        <div class="stat-box" id="location-display" style="min-width:70px;">
            <span class="stat-label">Location</span>
            <span class="stat-value" id="location-text" style="color:#2980b9; font-size:0.85rem;">📍 ...</span>
        </div>
    </div>

    <div id="gift-hud" class="hud">
        <span style="font-size: 1.8rem; margin-bottom: 5px;">🎁</span>
        <span id="gift-count" style="font-weight: 900; font-size: 1rem;">0</span>
        <span style="font-size: 0.55rem; opacity: 0.8; margin-top: 3px;">every 30 min</span>
    </div>

    <input type="file" id="file-input" accept=".json,.enc">

    <div id="bottom-bar" class="hud">
        <button id="btn-toggle-buy" class="btn btn-buy" style="position:relative;">Buy Property<span id="free-badge" class="free-badge hidden">0</span></button>
        <button id="btn-claim-rent" class="btn btn-claim" disabled>Claim $0.00</button>
        <button id="btn-checkout" class="btn btn-checkout" disabled>Checkout (0)</button>
    </div>

    <button id="btn-cheapest"><span class="cheapest-icon">🏷️</span>Cheapest<br>Property</button>

    <div id="map"></div>

    <div id="purchase-modal">
        <h2>Confirm Purchase</h2>
        <p id="purchase-count">Tiles: 0</p>
        <p id="purchase-price">Total Price: $0</p>
        <div class="modal-buttons">
            <button class="btn btn-cancel" id="btn-cancel-buy">Cancel</button>
            <button class="btn btn-confirm" id="btn-confirm-buy">Purchase</button>
        </div>
    </div>

    <div id="save-warning-modal">
        <h2>Cashout Success! 💰</h2>
        <p>Please create a save file now in case something goes wrong with your device storage!</p>
        <div class="modal-buttons">
            <button class="btn btn-confirm" id="btn-modal-save">Create Save 💾</button>
            <button class="btn btn-cancel" id="btn-modal-close-save">Close</button>
        </div>
    </div>

    <div id="reveal-screen">
        <h2 class="reveal-title" id="reveal-name">Acquired!</h2>
        <div id="reveal-list" class="reveal-list">
            </div>
        <button class="btn-continue" onclick="closeReveal()">Continue</button>
    </div>

    <div id="distance-money"></div>
    <div id="toast">Message</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        /**
         * GLOBAL CONSTANTS & CONFIGURATION
         */
        const STARTING_BALANCE = 2500;
        const TILE_SIZE = 0.0002; // Grid size in degrees (~22 meters)
        const MAX_BUY_DISTANCE = 500; // Maximum purchase distance in meters
        
        // Rarity Configuration
        const RARITIES = [
            { name: 'Common', chance: 0.50, color: '#87cefa', baseRentPerHour: 1.50, border: '#5dade2' }, 
            { name: 'Rare', chance: 0.30, color: '#90ee90', baseRentPerHour: 7.50, border: '#58d68d' }, 
            { name: 'Epic', chance: 0.15, color: '#ee82ee', baseRentPerHour: 30.00, border: '#af7ac5' }, 
            { name: 'Legendary', chance: 0.05, color: '#f39c12', baseRentPerHour: 150.00, border: '#d35400' } 
        ];

        const MS_PER_HOUR = 1000 * 60 * 60;
        const MS_PER_HALF_HOUR = MS_PER_HOUR / 2;
        
        // Encryption Key for Save Files
        const ENCRYPTION_KEY = "EarthTycoonSecureSaveV1";

        /**
         * GAME STATE MANAGEMENT
         */
        let gameState = {
            balance: STARTING_BALANCE,
            ownedTiles: {}, 
            lastRentClaimTime: Date.now(),
            totalRentGenerated: 0,
            freeProperties: 0,
            lastGiftHourTime: Date.now(),
            lastPopupShownTime: 0,
            lastActiveTime: Date.now()
        };

        let map;
        let playerMarker;
        let playerCircle;
        let currentPos = { lat: 0, lng: 0 };
        let buyModeActive = false;
        let initialZoomDone = false;
        
        let highlightLayer = L.layerGroup(); 
        let ownedLayer = L.layerGroup();     
        let customClusterLayer = L.layerGroup(); 
        let lightTileLayer;
        let darkTileLayer;
        let currentTileLayer;

        let selectedTiles = []; 
        let buyPriceLayer = L.layerGroup();
        let detailLayer = L.layerGroup();
        let lastLat = 0, lastLng = 0;
        let totalDistanceMeters = 0;
        let distanceMoneyTotal = 0;
        let distanceMoneyTimer = null;

        /**
         * ENCRYPTION LOGIC
         */
        function encryptData(data) {
            const str = JSON.stringify(data);
            let result = "";
            for (let i = 0; i < str.length; i++) {
                result += String.fromCharCode(str.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
            }
            return btoa(encodeURIComponent(result));
        }

        function decryptData(b64) {
            const str = decodeURIComponent(atob(b64));
            let result = "";
            for (let i = 0; i < str.length; i++) {
                result += String.fromCharCode(str.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
            }
            return JSON.parse(result);
        }

        function loadGame() {
            const saved = localStorage.getItem('earthTycoonEncryptedState');
            if (saved) {
                try {
                    const parsed = decryptData(saved);
                    gameState = { ...gameState, ...parsed };
                } catch (e) {
                    console.error("Error loading encrypted save file", e);
                    const oldSaved = localStorage.getItem('earthTycoonState');
                    if (oldSaved) {
                        gameState = { ...gameState, ...JSON.parse(oldSaved) };
                        saveGame(); 
                    }
                }
            } else {
                saveGame();
            }

            // Calculate offline earnings
            calculateOfflineEarnings();
        }

        function calculateOfflineEarnings() {
            const now = Date.now();
            const lastActive = gameState.lastActiveTime || now;
            const offlineMs = now - lastActive;

            if (offlineMs < 60000) return; // Less than 1 minute, skip

            // Offline rent earnings
            let baseRent = 0;
            for (let key in gameState.ownedTiles) {
                baseRent += gameState.ownedTiles[key].rentPerHour;
            }
            const propCount = Object.keys(gameState.ownedTiles).length;
            const bonusMultiplier = 1 + (propCount / 200);
            const totalHourlyRent = baseRent * bonusMultiplier;

            if (totalHourlyRent > 0) {
                const offlineRentEarned = (offlineMs / MS_PER_HOUR) * totalHourlyRent;
                gameState.balance += offlineRentEarned;
                gameState.totalRentGenerated += offlineRentEarned;
            }

            // Offline free properties
            if (!gameState.lastGiftHourTime) gameState.lastGiftHourTime = lastActive;
            let timeSinceGiftMs = now - gameState.lastGiftHourTime;
            if (timeSinceGiftMs >= MS_PER_HALF_HOUR) {
                let cyclesPassed = Math.floor(timeSinceGiftMs / MS_PER_HALF_HOUR);
                gameState.freeProperties += cyclesPassed;
                gameState.lastGiftHourTime += cyclesPassed * MS_PER_HALF_HOUR;
            }

            // Update last active time
            gameState.lastActiveTime = now;
            saveGame();

            // Show offline summary
            const offlineMinutes = Math.floor(offlineMs / 60000);
            const offlineHours = Math.floor(offlineMinutes / 60);
            const remainMins = offlineMinutes % 60;
            const timeStr = offlineHours > 0 ? `${offlineHours}h ${remainMins}m` : `${offlineMinutes}m`;
            const rentEarned = (offlineMs / MS_PER_HOUR) * totalHourlyRent;
            
            if (rentEarned > 0 || offlineMs >= MS_PER_HALF_HOUR) {
                setTimeout(() => {
                    showToast(`⏰ Offline for ${timeStr}! Earned $${rentEarned.toFixed(2)} + ${Math.floor(offlineMs / MS_PER_HALF_HOUR)} free properties!`);
                }, 1500);
            }
        }

        function saveGame() {
            gameState.lastActiveTime = Date.now();
            const encrypted = encryptData(gameState);
            localStorage.setItem('earthTycoonEncryptedState', encrypted);
        }

        function exportSaveFile() {
            saveGame(); 
            const dataStr = localStorage.getItem('earthTycoonEncryptedState');
            if (!dataStr) {
                showToast("No save data available to export!");
                return;
            }
            const blob = new Blob([dataStr], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `earth_tycoon_save_${Math.floor(Date.now() / 1000)}.enc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Encrypted save file created! 🔒");
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const contents = e.target.result;
                    const parsedData = decryptData(contents);
                    
                    if (parsedData && typeof parsedData.balance === 'number') {
                        gameState = { ...gameState, ...parsedData };
                        saveGame();
                        updateUI();
                        renderOwnedTiles();
                        renderClusters();
                        showToast("Save file loaded successfully! 📂");
                    } else {
                        throw new Error("Invalid save structure");
                    }
                } catch (err) {
                    console.error("Load failed:", err);
                    showToast("Failed to load save file! File might be corrupted or tampered with. ❌");
                }
                document.getElementById('file-input').value = "";
            };
            reader.readAsText(file);
        }

        /**
         * MATH & GRID LOGIC
         */
        
        function getGridCoords(lat, lng) {
            return {
                x: Math.floor(lng / TILE_SIZE),
                y: Math.floor(lat / TILE_SIZE)
            };
        }

        function getTileBounds(x, y) {
            return [
                [y * TILE_SIZE, x * TILE_SIZE],
                [(y + 1) * TILE_SIZE, (x + 1) * TILE_SIZE]
            ];
        }

        function calculateTilePrice(x, y) {
            let n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            let noise = n - Math.floor(n);
            let macro = (Math.sin(x / 30) + Math.cos(y / 30)) / 2; 
            let basePrice = 150;
            let multiplier = 1 + (macro + 1) * 2; 
            let finalPrice = Math.floor(((basePrice * multiplier) + (noise * 100)) * 0.4);
            
            // Slightly more expensive based on owned properties
            const ownedCount = Object.keys(gameState.ownedTiles).length;
            const priceScale = 1 + (ownedCount * 0.02); // +2% per owned property
            finalPrice = Math.floor(finalPrice * priceScale);
            
            return Math.max(20, Math.min(800, finalPrice));
        }

        function rollRarity() {
            const roll = Math.random();
            let cumulativeChance = 0;
            for (let rarity of RARITIES) {
                cumulativeChance += rarity.chance;
                if (roll <= cumulativeChance) {
                    return rarity;
                }
            }
            return RARITIES[0]; 
        }

        /**
         * INITIALIZATION & MAP SETUP
         */
        function initGame() {
            loadTheme();
            loadGame();
            updateUI();

            map = L.map('map', {
                zoomControl: false, 
                doubleClickZoom: false
            }).setView([20, 0], 2); 

            lightTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 20
            });
            darkTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 20
            });

            // Set initial tile layer based on theme
            const savedTheme = localStorage.getItem('earthTycoonTheme');
            if (savedTheme === 'dark') {
                darkTileLayer.addTo(map);
                currentTileLayer = darkTileLayer;
            } else {
                lightTileLayer.addTo(map);
                currentTileLayer = lightTileLayer;
            }

            ownedLayer.addTo(map);
            highlightLayer.addTo(map);
            buyPriceLayer.addTo(map);
            detailLayer.addTo(map);
            customClusterLayer.addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePlayerPosition, handleLocationError, {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 5000
                });
            } else {
                showToast("Geolocation is not supported.");
            }

            map.on('click', handleMapClick);

            map.on('zoomend', function() {
                const z = map.getZoom();
                if (z < 16) {
                    map.getContainer().classList.add('zoomed-out');
                    if (map.hasLayer(ownedLayer)) map.removeLayer(ownedLayer);
                    if (map.hasLayer(buyPriceLayer)) map.removeLayer(buyPriceLayer);
                    if (map.hasLayer(detailLayer)) map.removeLayer(detailLayer);
                    if (!map.hasLayer(customClusterLayer)) map.addLayer(customClusterLayer);
                    renderClusters();
                } else {
                    map.getContainer().classList.remove('zoomed-out');
                    if (!map.hasLayer(ownedLayer)) map.addLayer(ownedLayer);
                    if (map.hasLayer(customClusterLayer)) map.removeLayer(customClusterLayer);
                }
                renderBuyPrices();
                if (z >= 19) { map.addLayer(detailLayer); renderDetailLabels(); }
                else { if (map.hasLayer(detailLayer)) map.removeLayer(detailLayer); }
            });

            renderOwnedTiles();
            renderClusters();
            renderBuyPrices();
            
            // Re-render on map move for buy prices and details
            map.on('moveend', function() {
                renderBuyPrices();
                if (map.getZoom() >= 19) renderDetailLabels();
            });
            
            setInterval(calculateRent, 1000); 
            calculateRent(); 

            document.getElementById('file-input').addEventListener('change', handleFileUpload);
            
            document.getElementById('btn-modal-close-save').addEventListener('click', function() {
                document.getElementById('save-warning-modal').style.display = 'none';
            });
            document.getElementById('btn-modal-save').addEventListener('click', function() {
                exportSaveFile();
                document.getElementById('save-warning-modal').style.display = 'none';
            });

            // Cheapest property button
            document.getElementById('btn-cheapest').addEventListener('click', flyToCheapestProperty);

            // Gift HUD shows info toast
            document.getElementById('gift-hud').addEventListener('click', function() {
                const interval = getGiftIntervalMs();
            const mins = Math.floor(interval / 60000);
            showToast(`🎁 Free Properties: ${gameState.freeProperties} (1 every ${mins}min)`);
            });
            
            // Start countdown timer update
            setInterval(updateGiftCountdown, 1000);
            updateGiftCountdown();
        }

        function updatePlayerPosition(position) {
            const newLat = position.coords.latitude;
            const newLng = position.coords.longitude;

            // Distance money tracking
            if (lastLat !== 0 && lastLng !== 0) {
                const distMoved = L.latLng(lastLat, lastLng).distanceTo(L.latLng(newLat, newLng));
                if (distMoved > 5 && distMoved < 50000) {
                    totalDistanceMeters += distMoved;
                    // Every 1000m = $10
                    const newKm = Math.floor(totalDistanceMeters / 1000);
                    const oldKm = Math.floor((totalDistanceMeters - distMoved) / 1000);
                    if (newKm > oldKm) {
                        const earned = (newKm - oldKm) * 10;
                        gameState.balance += earned;
                        distanceMoneyTotal += earned;
                        // Show distance money notification
                        const distEl = document.getElementById('distance-money');
                        if (distEl) {
                            distEl.innerText = `+$${earned} distance 🏃`;
                            distEl.style.opacity = '1';
                            if (distanceMoneyTimer) clearTimeout(distanceMoneyTimer);
                            distanceMoneyTimer = setTimeout(() => {
                                distEl.style.opacity = '0';
                            }, 5000);
                        }
                        updateUI();
                    }
                }
            }
            lastLat = newLat;
            lastLng = newLng;

            currentPos = { lat: newLat, lng: newLng };
            const playerLatLng = [currentPos.lat, currentPos.lng];

            if (!initialZoomDone) {
                initialZoomDone = true;
                // Reverse geocode for location display
                updateLocation(newLat, newLng);
                
                playerMarker = L.circleMarker(playerLatLng, {
                    color: '#2980b9',
                    fillColor: '#3498db',
                    fillOpacity: 1,
                    radius: 8,
                    weight: 3
                }).addTo(map);

                playerCircle = L.circle(playerLatLng, {
                    radius: MAX_BUY_DISTANCE,
                    color: '#2980b9',
                    weight: 1.5,
                    fillColor: '#3498db',
                    fillOpacity: 0.04,
                    dashArray: '6, 6'
                }).addTo(map);

                map.flyTo(playerLatLng, 17, {
                    animate: true,
                    duration: 4.0 
                });
            } else {
                if (playerMarker) playerMarker.setLatLng(playerLatLng);
                if (playerCircle) playerCircle.setLatLng(playerLatLng);
            }
        }

        function handleLocationError(error) {
            console.warn(`Geolocation error: ${error.message}`);
        }

        /**
         * CLUSTERING LOGIC FOR ZOOMED OUT VIEW
         */
        function renderClusters() {
            customClusterLayer.clearLayers();
            
            let clusters = {};
            let clusterGridSize = 0.02; 
            
            for (let key in gameState.ownedTiles) {
                let [x, y] = key.split(',').map(Number);
                
                let tileLat = (y + 0.5) * TILE_SIZE;
                let tileLng = (x + 0.5) * TILE_SIZE;
                
                let cx = Math.floor(tileLng / clusterGridSize);
                let cy = Math.floor(tileLat / clusterGridSize);
                let cKey = `${cx},${cy}`;
                
                if (!clusters[cKey]) {
                    clusters[cKey] = { latSum: 0, lngSum: 0, count: 0 };
                }
                clusters[cKey].latSum += tileLat;
                clusters[cKey].lngSum += tileLng;
                clusters[cKey].count++;
            }
            
            for (let cKey in clusters) {
                let c = clusters[cKey];
                let avgLat = c.latSum / c.count;
                let avgLng = c.lngSum / c.count;
                
                let iconHtml = `<div style="background:#e74c3c; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.6);"></div>`;
                
                let icon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-cluster-icon',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                
                L.marker([avgLat, avgLng], {icon: icon}).addTo(customClusterLayer);
            }
        }

        /**
         * BUYING MECHANICS & MULTI-SELECT
         */

        const btnToggleBuy = document.getElementById('btn-toggle-buy');
        const btnClaimRent = document.getElementById('btn-claim-rent');
        const btnCheckout = document.getElementById('btn-checkout');

        btnToggleBuy.addEventListener('click', function() {
            if (map.getZoom() < 16) {
                showToast("Please zoom in closer to buy properties! 🔍");
                return;
            }

            buyModeActive = !buyModeActive;
            if (buyModeActive) {
                this.classList.add('active');
                this.innerText = "Cancel Mode";
                this.querySelector('.free-badge') && this.querySelector('.free-badge').remove();
                map.getContainer().style.cursor = 'crosshair';
                
                btnClaimRent.style.display = 'none';
                btnCheckout.style.display = 'block';
                
                renderBuyPrices();
                showToast("Tap tiles inside your 500m radius circle to select.");
            } else {
                this.classList.remove('active');
                this.innerHTML = 'Buy Property<span id="free-badge" class="free-badge' + (gameState.freeProperties > 0 ? '' : ' hidden') + '">' + gameState.freeProperties + '</span>';
                map.getContainer().style.cursor = '';
                
                btnClaimRent.style.display = 'block';
                btnCheckout.style.display = 'none';
                
                selectedTiles = [];
                renderHighlights();
                updateCheckoutButton();
                buyPriceLayer.clearLayers();
            }
        });

        function handleMapClick(e) {
            if (!buyModeActive) return;

            if (currentPos.lat === 0 && currentPos.lng === 0) {
                showToast("Waiting for GPS location fixes... 🛰️");
                return;
            }

            const playerLatLng = L.latLng(currentPos.lat, currentPos.lng);
            const clickDistance = playerLatLng.distanceTo(e.latlng);

            if (clickDistance > MAX_BUY_DISTANCE) {
                showToast("Too far away! You can only buy within 500m. 🏃‍♂️");
                return;
            }

            const coords = getGridCoords(e.latlng.lat, e.latlng.lng);
            const tileKey = `${coords.x},${coords.y}`;

            if (gameState.ownedTiles[tileKey]) {
                showToast("This property is already owned!");
                return;
            }

            const existingIndex = selectedTiles.findIndex(t => t.key === tileKey);
            
            if (existingIndex >= 0) {
                selectedTiles.splice(existingIndex, 1);
            } else {
                const price = calculateTilePrice(coords.x, coords.y);
                selectedTiles.push({
                    x: coords.x,
                    y: coords.y,
                    key: tileKey,
                    price: price
                });
            }

            renderHighlights();
            updateCheckoutButton();
        }

        function renderHighlights() {
            highlightLayer.clearLayers();
            for (let tile of selectedTiles) {
                const bounds = getTileBounds(tile.x, tile.y);
                L.rectangle(bounds, {
                    color: '#f1c40f',
                    weight: 3,
                    fillColor: '#f1c40f',
                    fillOpacity: 0.4
                }).addTo(highlightLayer);
            }
        }

        function updateCheckoutButton() {
            if (selectedTiles.length > 0) {
                let freeToUse = Math.min(gameState.freeProperties, selectedTiles.length);
                let paidCount = selectedTiles.length - freeToUse;
                let paidTotal = 0;
                if (paidCount > 0) {
                    let sorted = [...selectedTiles].sort((a, b) => a.price - b.price);
                    for (let i = 0; i < paidCount; i++) {
                        paidTotal += sorted[i].price;
                    }
                }
                btnCheckout.disabled = false;
                if (paidTotal > 0) {
                    btnCheckout.innerText = `Checkout $${paidTotal.toLocaleString()}`;
                } else {
                    btnCheckout.innerText = `Checkout FREE`;
                }
            } else {
                btnCheckout.disabled = true;
                btnCheckout.innerText = `Checkout (0)`;
            }
        }

        btnCheckout.addEventListener('click', function() {
            if (selectedTiles.length === 0) return;
            
            let total = 0;
            for (let t of selectedTiles) total += t.price;

            document.getElementById('purchase-count').innerText = `Selected Tiles: ${selectedTiles.length}`;
            document.getElementById('purchase-price').innerText = `Total Price: $${total.toLocaleString()}`;
            document.getElementById('purchase-modal').style.display = 'block';
        });

        document.getElementById('btn-cancel-buy').addEventListener('click', function() {
            document.getElementById('purchase-modal').style.display = 'none';
        });

        document.getElementById('btn-confirm-buy').addEventListener('click', function() {
            let total = 0;
            for (let t of selectedTiles) total += t.price;

            let freeToUse = Math.min(gameState.freeProperties, selectedTiles.length);
            let paidCount = selectedTiles.length - freeToUse;
            let paidTotal = 0;
            // Calculate cost of only the paid tiles (the cheapest ones if mixing)
            if (paidCount > 0) {
                let sorted = [...selectedTiles].sort((a, b) => a.price - b.price);
                for (let i = 0; i < paidCount; i++) {
                    paidTotal += sorted[i].price;
                }
            }

            if (gameState.balance < paidTotal) {
                showToast("Not enough money for all selected tiles!");
                document.getElementById('purchase-modal').style.display = 'none';
                return;
            }

            gameState.balance -= paidTotal;
            gameState.freeProperties -= freeToUse;
            
            let acquiredTiles = [];

            for (let tile of selectedTiles) {
                const rarity = rollRarity();
                
                const priceMultiplier = tile.price / 150; 
                const variance = 1 + ((Math.random() * 0.6) - 0.3); 
                const finalRentPerHour = rarity.baseRentPerHour * priceMultiplier * variance;
                
                gameState.ownedTiles[tile.key] = {
                    rarity: rarity.name,
                    color: rarity.color,
                    border: rarity.border,
                    rentPerHour: finalRentPerHour,
                    purchasedAt: Date.now()
                };

                acquiredTiles.push({
                    name: rarity.name,
                    color: rarity.color,
                    border: rarity.border,
                    rentPerHour: finalRentPerHour
                });
            }

            saveGame();
            updateUI();
            
            document.getElementById('purchase-modal').style.display = 'none';
            
            if (freeToUse > 0 && paidTotal === 0) {
                showToast(`🎉 Used ${freeToUse} free propert${freeToUse > 1 ? 'ies' : 'y'}!`);
            } else if (freeToUse > 0) {
                showToast(`🎉 Used ${freeToUse} free + paid $${paidTotal}`);
            }
            showAnimatedRevealScreen(acquiredTiles);
            
            selectedTiles = [];
            renderHighlights();
            updateCheckoutButton();
            renderOwnedTiles();
            renderClusters();
        });

        /**
         * CHEAPEST PROPERTY IN RANGE
         */
        function flyToCheapestProperty() {
            if (currentPos.lat === 0 && currentPos.lng === 0) {
                showToast("Waiting for GPS location... 🛰️");
                return;
            }

            let cheapestPrice = Infinity;
            let cheapestX = 0;
            let cheapestY = 0;
            let found = false;

            // Scan tiles in 500m radius
            const playerGridCoords = getGridCoords(currentPos.lat, currentPos.lng);
            const playerLatLng = L.latLng(currentPos.lat, currentPos.lng);
            const radiusInGrid = Math.ceil(MAX_BUY_DISTANCE / (TILE_SIZE * 111000));

            for (let dx = -radiusInGrid; dx <= radiusInGrid; dx++) {
                for (let dy = -radiusInGrid; dy <= radiusInGrid; dy++) {
                    let checkX = playerGridCoords.x + dx;
                    let checkY = playerGridCoords.y + dy;
                    let key = `${checkX},${checkY}`;

            if (gameState.ownedTiles[key]) continue;

                    let bounds = getTileBounds(checkX, checkY);
                    let centerLat = (bounds[0][0] + bounds[1][0]) / 2;
                    let centerLng = (bounds[0][1] + bounds[1][1]) / 2;
                    let dist = playerLatLng.distanceTo(L.latLng(centerLat, centerLng));

                    if (dist <= MAX_BUY_DISTANCE) {
                        let price = calculateTilePrice(checkX, checkY);
                        if (price < cheapestPrice) {
                            cheapestPrice = price;
                            cheapestX = checkX;
                            cheapestY = checkY;
                            found = true;
                        }
                    }
                }
            }

            if (found) {
                let bounds = getTileBounds(cheapestX, cheapestY);
                let centerLat = (bounds[0][0] + bounds[1][0]) / 2;
                let centerLng = (bounds[0][1] + bounds[1][1]) / 2;
                map.flyTo([centerLat, centerLng], 18, { animate: true, duration: 1.5 });
                showToast(`🏷️ Cheapest: $${cheapestPrice} — flying to it!`);
            } else {
                showToast("No unowned properties in range! 🏃‍♂️ Move to a new area.");
            }
        }

        /**
         * RENT & GIFT SYSTEM 
         */
        
        function calculateRent() {
            const now = new Date();
            const lastClaim = new Date(gameState.lastRentClaimTime);
            
            const timePassedMs = now.getTime() - lastClaim.getTime();
            
            let baseHourlyRent = 0;
            for (let key in gameState.ownedTiles) {
                baseHourlyRent += gameState.ownedTiles[key].rentPerHour;
            }

            // Bonus: +0.5% per property owned
            const propertyCount = Object.keys(gameState.ownedTiles).length;
            const bonusPercent = propertyCount * 0.5;
            const bonusMultiplier = 1 + (bonusPercent / 200);
            const totalHourlyRent = baseHourlyRent * bonusMultiplier;

            // Update yield display with bonus info
            const bonusDisplay = document.getElementById('hourly-bonus-display');
            const yieldDisplay = document.getElementById('hourly-yield-display');
            if (propertyCount > 0) {
                bonusDisplay.innerText = `Base $${baseHourlyRent.toFixed(2)} + ${bonusPercent.toFixed(1)}%`;
            } else {
                bonusDisplay.innerText = '';
            }
            yieldDisplay.innerText = `$${totalHourlyRent.toFixed(2)}`;

            const exactPendingRent = (timePassedMs / MS_PER_HOUR) * totalHourlyRent;
            const rentDisplay = document.getElementById('rent-display');
            rentDisplay.innerText = `$${exactPendingRent.toFixed(4)}`;

            const claimBtn = document.getElementById('btn-claim-rent');

            if (exactPendingRent > 0) {
                claimBtn.disabled = false;
                claimBtn.innerText = `Claim $${exactPendingRent.toFixed(2)}`;
                rentDisplay.style.color = '#e67e22'; 
            } else {
                claimBtn.disabled = true;
                claimBtn.innerText = `Claim $0.00`;
                rentDisplay.style.color = '#2c3e50';
            }

            // Free Property Timer - interval depends on property count
            if (!gameState.lastGiftHourTime) gameState.lastGiftHourTime = now.getTime();
            if (gameState.freeProperties === undefined) gameState.freeProperties = 0;

            const giftIntervalMs = getGiftIntervalMs();
            let timeSinceGiftMs = now.getTime() - gameState.lastGiftHourTime;
            if (timeSinceGiftMs >= giftIntervalMs) {
                let cyclesPassed = Math.floor(timeSinceGiftMs / giftIntervalMs);
                gameState.freeProperties += cyclesPassed;
                gameState.lastGiftHourTime += cyclesPassed * giftIntervalMs;
                saveGame();
            }

            const giftCountDisplay = document.getElementById('gift-count');
            const giftHud = document.getElementById('gift-hud');
            const freeBadge = document.getElementById('free-badge');
            
            giftCountDisplay.innerText = gameState.freeProperties;

            if (gameState.freeProperties > 0) {
                giftHud.style.background = '#8e44ad';
                giftHud.style.transform = 'scale(1.05)';
                freeBadge.classList.remove('hidden');
                freeBadge.innerText = gameState.freeProperties;
            } else {
                giftHud.style.background = '#bdc3c7';
                giftHud.style.transform = 'scale(1)';
                freeBadge.classList.add('hidden');
            }
        }

        /**
         * GIFT SYSTEM - Interval scales with property count
         */
        function getGiftIntervalMs() {
            const count = Object.keys(gameState.ownedTiles).length;
            if (count >= 100) return MS_PER_HOUR * 6;   // 6 hours
            if (count >= 50) return MS_PER_HOUR * 2;    // 2 hours
            if (count >= 25) return MS_PER_HOUR * 1;    // 1 hour
            return MS_PER_HOUR / 2;                      // 30 min (default)
        }

        function updateGiftCountdown() {
            const giftIntervalMs = getGiftIntervalMs();
            let timeSinceGiftMs = Date.now() - gameState.lastGiftHourTime;
            if (timeSinceGiftMs >= giftIntervalMs) {
                let cyclesPassed = Math.floor(timeSinceGiftMs / giftIntervalMs);
                if (cyclesPassed > 0) {
                    gameState.freeProperties += cyclesPassed;
                    gameState.lastGiftHourTime += cyclesPassed * giftIntervalMs;
                    saveGame();
                    showToast(`🎁 +${cyclesPassed} Free Propert${cyclesPassed > 1 ? 'ies' : 'y'}!`);
                    const freeBadge = document.getElementById('free-badge');
                    if (freeBadge) {
                        freeBadge.classList.remove('hidden');
                        freeBadge.innerText = gameState.freeProperties;
                    }
                    document.getElementById('gift-count').innerText = gameState.freeProperties;
                    const giftHud = document.getElementById('gift-hud');
                    giftHud.style.background = '#8e44ad';
                    giftHud.style.transform = 'scale(1.05)';
                }
            }
        }

        /**
         * SETTINGS PANEL TOGGLE
         */
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            // Sync settings toggle
            const isDark = document.body.classList.contains('dark-mode');
            const dot = document.getElementById('settings-theme-dot');
            const toggleBg = document.getElementById('settings-theme-toggle');
            if (isDark) { dot.style.left = '20px'; toggleBg.style.background = '#3498db'; }
            else { dot.style.left = '2px'; toggleBg.style.background = '#555'; }
        }

        /**
         * REVERSE GEOCODING - Get city name from coordinates
         */
        function updateLocation(lat, lng) {
            const locEl = document.getElementById('location-text');
            if (!locEl) return;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10&addressdetails=1`)
                .then(r => r.json())
                .then(data => {
                    const addr = data.address;
                    const city = addr.city || addr.town || addr.village || addr.municipality || '';
                    const country = addr.country_code ? addr.country_code.toUpperCase() : '';
                    if (city) {
                        locEl.innerText = `📍 ${city}${country ? ', ' + country : ''}`;
                    } else {
                        locEl.innerText = `📍 ${lat.toFixed(2)}, ${lng.toFixed(2)}`;
                    }
                })
                .catch(() => {
                    locEl.innerText = `📍 ${lat.toFixed(2)}, ${lng.toFixed(2)}`;
                });
        }

        /**
         * DARK MODE / LIGHT MODE TOGGLE
         */
        function toggleTheme() {
            const btn = document.getElementById('theme-toggle');
            const icon = btn.querySelector('.icon');
            
            // Add spin animation
            btn.classList.add('theme-spinning');
            
            setTimeout(() => {
                if (btn.classList.contains('dark')) {
                    btn.classList.remove('dark');
                    btn.classList.add('light');
                    icon.textContent = '☀️';
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('earthTycoonTheme', 'light');
                    
                    // Switch to light tiles
                    if (currentTileLayer) map.removeLayer(currentTileLayer);
                    lightTileLayer.addTo(map);
                    currentTileLayer = lightTileLayer;
                } else {
                    btn.classList.remove('light');
                    btn.classList.add('dark');
                    icon.textContent = '🌙';
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('earthTycoonTheme', 'dark');
                    
                    // Switch to dark tiles
                    if (currentTileLayer) map.removeLayer(currentTileLayer);
                    darkTileLayer.addTo(map);
                    currentTileLayer = darkTileLayer;
                }
                
                setTimeout(() => {
                    btn.classList.remove('theme-spinning');
                }, 300);
            }, 200);
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('earthTycoonTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('theme-toggle');
                btn.classList.remove('light');
                btn.classList.add('dark');
                btn.querySelector('.icon').textContent = '🌙';
                // Sync settings toggle
                const dot = document.getElementById('settings-theme-dot');
                const toggleBg = document.getElementById('settings-theme-toggle');
                if (dot) { dot.style.left = '20px'; toggleBg.style.background = '#3498db'; }
            }
        }

            document.getElementById('btn-claim-rent').addEventListener('click', function() {
            const now = new Date();
            const lastClaim = new Date(gameState.lastRentClaimTime);
            const timePassedMs = now.getTime() - lastClaim.getTime();
            
            let baseRent = 0;
            for (let key in gameState.ownedTiles) {
                baseRent += gameState.ownedTiles[key].rentPerHour;
            }
            const propCount = Object.keys(gameState.ownedTiles).length;
            const totalHourlyRent = baseRent * (1 + propCount / 200);

            const rentEarned = (timePassedMs / MS_PER_HOUR) * totalHourlyRent;
            
            if (rentEarned > 0) {
                gameState.balance += rentEarned;
                gameState.totalRentGenerated += rentEarned;
                gameState.lastRentClaimTime = now.getTime();

                saveGame();
                updateUI();
                calculateRent();
                
                // Only show save-warning popup once per hour
                const timeSinceLastPopup = now.getTime() - (gameState.lastPopupShownTime || 0);
                if (timeSinceLastPopup >= MS_PER_HOUR) {
                    gameState.lastPopupShownTime = now.getTime();
                    saveGame();
                    document.getElementById('save-warning-modal').style.display = 'block';
                } else {
                    const minsUntilPopup = Math.ceil((MS_PER_HOUR - timeSinceLastPopup) / 60000);
                    showToast(`Rent claimed! ✅ Backup reminder in ~${minsUntilPopup}min`);
                }
            }
        });

        /**
         * VISUAL RENDERING
         */

        function renderOwnedTiles() {
            ownedLayer.clearLayers();
            for (let key in gameState.ownedTiles) {
                const [xStr, yStr] = key.split(',');
                const x = parseInt(xStr);
                const y = parseInt(yStr);
                const tileData = gameState.ownedTiles[key];

                const bounds = getTileBounds(x, y);
                // Always use green border for player's own properties
                const rect = L.rectangle(bounds, {
                    color: '#2ecc71',
                    weight: 3,
                    fillColor: tileData.color,        
                    fillOpacity: 0.6
                });

                rect.bindTooltip(`$${tileData.rentPerHour.toFixed(2)}/h`, {
                    permanent: true,
                    direction: 'center',
                    className: 'rent-label'
                });

                rect.addTo(ownedLayer);
            }
        }

        /**
         * BUY MODE GRID - Shows tile prices when in buy mode
         */
        function renderBuyPrices() {
            buyPriceLayer.clearLayers();
        }

        /**
         * DETAIL LABELS - Removed per user request
         */
        function renderDetailLabels() {
            detailLayer.clearLayers();
        }

        /**
         * UI HELPERS
         */
        
        function updateUI() {
            document.getElementById('balance-display').innerText = `$${gameState.balance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('property-count').innerText = Object.keys(gameState.ownedTiles).length;
            
            // Update free badge
            const freeBadge = document.getElementById('free-badge');
            if (freeBadge) {
                if (gameState.freeProperties > 0) {
                    freeBadge.classList.remove('hidden');
                    freeBadge.innerText = gameState.freeProperties;
                } else {
                    freeBadge.classList.add('hidden');
                }
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = 1;
            setTimeout(() => {
                toast.style.opacity = 0;
            }, 3000);
        }

        function showAnimatedRevealScreen(acquiredItems) {
            const screen = document.getElementById('reveal-screen');
            const listContainer = document.getElementById('reveal-list');
            const title = document.getElementById('reveal-name');
            
            listContainer.innerHTML = ''; 
            
            title.innerText = `${acquiredItems.length} Reward${acquiredItems.length > 1 ? 's' : ''} Acquired!`;
            
            acquiredItems.forEach((item, index) => {
                const delay = index * 0.15; 
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'reveal-item';
                itemDiv.style.borderLeftColor = item.border;
                itemDiv.style.animationDelay = `${delay}s`;
                
                if(item.isCash) {
                    itemDiv.innerHTML = `
                        <span class="reveal-item-name" style="color: ${item.color};">${item.name}</span>
                        <span class="reveal-item-rent">+$${item.amount.toLocaleString()}</span>
                    `;
                } else {
                    itemDiv.innerHTML = `
                        <span class="reveal-item-name" style="color: ${item.color};">${item.name}</span>
                        <span class="reveal-item-rent">+$${item.rentPerHour.toFixed(2)} / hr</span>
                    `;
                }
                
                listContainer.appendChild(itemDiv);
            });

            screen.style.display = 'flex';
        }

        function closeReveal() {
            document.getElementById('reveal-screen').style.display = 'none';
        }

        window.onload = initGame;

    </script>
</body>
